<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContactFrame</title>
    <link rel="stylesheet" href="assets/css/iframe.css" />
  </head>
  <body>
    <main class="contact-options">
      <div class="contact-card">
        <img src="assets/icons/mail.svg" alt="SVG Mail Icon" class="icon" />
        <h3>E-mail</h3>
        <p>
          <a href="mailto:jbruianibarco@gmail.com" target="_blank"
            >jbruianibarco@gmail.com</a
          >
        </p>
      </div>
      <div class="contact-card">
        <img
          src="assets/icons/linkedin.svg"
          alt="SVG LinkedIn Icon"
          class="icon"
        />
        <h3>LinkedIn</h3>
        <p>
          <a href="https://linkedin.com/in/joseluizbbarco" target="_blank"
            >LinkedIn.com/in/joseluizbbarco</a
          >
        </p>
      </div>
      <div class="contact-card">
        <img src="assets/icons/github.svg" alt="SVG GitHub Icon" class="icon" />
        <h3>GitHub</h3>
        <p>
          <a
            href="http://github.com/JLBBARCO"
            target="_blank"
            rel="noopener noreferrer"
            >github.com/JLBBARCO</a
          >
        </p>
      </div>
      <div class="contact-card">
        <img
          src="assets/icons/facebook.svg"
          alt="SVG Facebook Icon"
          class="icon"
        />
        <h3>Facebook</h3>
        <p>
          <a
            href="http://facebook.com/joseluizbrubarco"
            target="_blank"
            rel="noopener noreferrer"
          >
            facebook.com/joseluizbrubarco
          </a>
        </p>
      </div>
      <div class="contact-card">
        <img
          src="assets/icons/instagram.svg"
          alt="SVG Instagram Icon"
          class="icon"
        />
        <h3>Instagram</h3>
        <p>
          <a
            href="http://instagram.com/joseluizbrubarco"
            target="_blank"
            rel="noopener noreferrer"
          >
            instagram.com/joseluizbrubarco
          </a>
        </p>
      </div>
      <div class="contact-card">
        <img
          src="assets/icons/youtube.svg"
          alt="SVG Instagram Icon"
          class="icon"
        />
        <h3>YouTube</h3>
        <p>
          <a
            href="http://youtube.com/@joseluizbbarco"
            target="_blank"
            rel="noopener noreferrer"
          >
            youtube.com/@joseluizbbarco
          </a>
        </p>
      </div>
    </main>
  </body>
</html>

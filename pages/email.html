<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        input{
            width: 90vw;
            margin: 5px 10px;
            padding: 10px;
            border-radius: 10px;
            color: #fff;
            background-color: #ffffff00;
        }

        #texto{
            height: 20vh;
        }

        p.legenda{
            text-align: center;
            font-size: .75em;
        }
    </style>
</head>
<body>
    <form action="">
        <input type="email" name="email" id="email" placeholder="E-mail">
        <input type="text" name="texto" id="texto" placeholder="Mensagem" maxlength="3000">
        <p class="legenda">No máximo 3 000 caracteres.</p>
    </form>
</body>
</html>

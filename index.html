<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre em Contato</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="18" fill="none" stroke="#2196f3" stroke-width="2"/>
          <path d="M20 10v20M10 20h20" stroke="#2196f3" stroke-width="2"/>
        </svg>
        <span>Contato</span>
      </div>
      <ul>
        <li><a href="#inicio">Início</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#servicos">Serviços</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Entre em Contato Conosco</h1>
      <p>Estamos aqui para ajudar e responder às suas perguntas</p>
      <div class="contact-options">
        <div class="contact-card">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <path d="M40 8H8c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h32c2.2 0 4-1.8 4-4V12c0-2.2-1.8-4-4-4z" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M40 8L24 24 8 8" fill="none" stroke="#333" stroke-width="2"/>
          </svg>
          <h3>Email</h3>
          <p>jbruianibarco@gmail.com</p>
        </div>
        <div class="contact-card">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <path d="M24 4C12.954 4 4 12.954 4 24s8.954 20 20 20 20-8.954 20-20S35.046 4 24 4zm-4.875 29.904c-.597 0-1.08-.485-1.08-1.082s.483-1.082 1.08-1.082c.596 0 1.08.485 1.08 1.082s-.484 1.082-1.08 1.082zm10.02-15.928c-.38.142-3.104 1.254-3.104 3.796 0 2.542 2.724 2.614 2.724 3.796 0 1.182-1.564 1.792-2.904 1.792-1.34 0-2.904-.61-2.904-1.792h-2.18c0 2.542 2.724 3.796 5.084 3.796s5.084-1.254 5.084-3.796c0-2.542-2.724-2.614-2.724-3.796 0-1.182 1.564-1.792 2.904-1.792 1.34 0 2.904.61 2.904 1.792h2.18c0-2.542-2.724-3.796-5.084-3.796s-5.084 1.254-5.084 3.796z" fill="none" stroke="#333" stroke-width="2"/>
          </svg>
          <h3>GitHub</h3>
          <p><a href="https://github.com/jlbbarco" target="_blank">github.com/jlbbarco</a></p>
        </div>
        <div class="contact-card">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M14 20v14M14 16v-2M24 34V24c0-2-1-4-4-4s-4 2-4 4m22 10V24c0-2-1-4-4-4s-4 2-4 4v10" fill="none" stroke="#333" stroke-width="2"/>
          </svg>
          <h3>LinkedIn</h3>
          <p><a href="https://linkedin.com/in/joseluizbbarco" target="_blank">linkedin.com/in/joseluizbbarco</a></p>
        </div>
      </div>
    </section>

    <section class="contact-form">
      <h2>Envie sua mensagem</h2>
      <form id="contactForm">
        <div class="form-group">
          <label for="name">Nome</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="message">Mensagem</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Enviar Mensagem</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

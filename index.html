<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get in Contact</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <circle
              cx="20"
              cy="20"
              r="18"
              fill="none"
              stroke="#2196f3"
              stroke-width="2"
            />
            <path d="M20 10v20M10 20h20" stroke="#2196f3" stroke-width="2" />
          </svg>
          <span>Contact</span>
        </div>
        <div class="links">
          <a href="https://jlbbarco.github.io/" class="interno">Home</a>
        </div>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h1>Connect Me</h1>
        <p>We're here to help</p>
        <div class="contact-options">
          <div class="contact-card">
            <i class="fa-regular fa-envelope"></i>
            <h3>Email</h3>
            <p>
              <a href="mailto:jbruianibarco@gmail.com" target="_blank"
                >jbruianibarco@gmail.com</a
              >
            </p>
          </div>
          <div class="contact-card">
            <i class="fa-brands fa-github"></i>
            <h3>GitHub</h3>
            <p>
              <a href="https://github.com/jlbbarco" target="_blank"
                >github.com/jlbbarco</a
              >
            </p>
          </div>
          <div class="contact-card">
            <i class="fa-brands fa-linkedin"></i>
            <h3>LinkedIn</h3>
            <p>
              <a href="https://linkedin.com/in/joseluizbbarco" target="_blank"
                >LinkedIn.com/in/joseluizbbarco</a
              >
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="js/script.js"></script>
  </body>
</html>
